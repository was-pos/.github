name: Update Org README Stats

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch: {}    # allows manual trigger from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_STATS_TOKEN }}

      - name: Debug secret presence
        env:
          ORG_TOKEN: ${{ secrets.ORG_STATS_TOKEN }}
        run: |
          if [ -z "$ORG_TOKEN" ]; then
            echo "ORG_STATS_TOKEN is EMPTY or not accessible to this repo."
          else
            echo "ORG_STATS_TOKEN has a value (length: ${#ORG_TOKEN} chars)."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update README with live stats
        env:
          ORG_TOKEN: ${{ secrets.ORG_STATS_TOKEN }}
        run: node scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --cached --quiet || git commit -m "chore: update org stats [automated]"
          git push
